// wolfCI command-line client protocol. Distinct from
// AgentService so the cert-CN -> matrix permission check can
// gate human callers separately from build agents.
syntax = "proto3";

package wolfci.v1.cli;

option go_package = "github.com/kaleb-himes/wolfCI/api/v1/cli;cliv1";

// CLIService is what wolfci-ctl talks to.
service CLIService {
  // ListJobs returns every job defined on disk.
  rpc ListJobs(Empty) returns (ListJobsResponse);

  // ListNodes returns every agent the server knows about,
  // both Register'd (visible) and currently connected.
  rpc ListNodes(Empty) returns (ListNodesResponse);

  // StreamBuildLog opens a server-streaming RPC that emits
  // each chunk of builds/<job>/<n>/log.live as it is written.
  // The server polls for new bytes until the client cancels
  // ctx or the configured idle timeout elapses with no new
  // output.
  rpc StreamBuildLog(BuildLogRequest) returns (stream LogLine);
}

message Empty {}

message ListJobsResponse {
  repeated Job jobs = 1;
}

message Job {
  string name = 1;
  string description = 2;
  string node_label = 3;
  int32 step_count = 4;
}

message ListNodesResponse {
  repeated Node nodes = 1;
}

message Node {
  string agent_id = 1;
  repeated string labels = 2;
  int32 executors = 3;
  bool connected = 4;
}

message BuildLogRequest {
  string job_name = 1;
  int32 build_number = 2;
}

message LogLine {
  bytes data = 1;
}
