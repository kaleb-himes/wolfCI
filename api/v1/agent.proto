// wolfCI agent-to-server protocol. Hand-edit this file; the
// matching .pb.go and _grpc.pb.go files are generated by
// scripts/gen-proto.sh.
syntax = "proto3";

package wolfci.v1;

option go_package = "github.com/kaleb-himes/wolfCI/api/v1;wolfciv1";

// AgentService is the surface the wolfCI server exposes to
// agents over wolfSSL mTLS. Phase 5.2/5.3 ships the Register
// RPC; follow-on iterations add the bidirectional Connect
// stream for job dispatch and log streaming.
service AgentService {
  // Register lets an agent announce itself to the server. The
  // server returns its version and an accepted flag.
  rpc Register(AgentInfo) returns (RegisterResponse);
}

// AgentInfo is what an agent tells the server about itself when
// it first connects.
message AgentInfo {
  // agent_id is a stable identifier chosen by the agent
  // (typically derived from its TLS cert CN).
  string agent_id = 1;

  // labels are the strings the agent advertises for node-label
  // matching. A Job.node_label matches an agent if this list
  // contains that string.
  repeated string labels = 2;

  // executors is the maximum number of concurrent jobs this
  // agent is willing to run.
  int32 executors = 3;
}

// RegisterResponse is the server's reply to Register.
message RegisterResponse {
  // server_version is the wolfCI server's build identifier.
  string server_version = 1;

  // accepted is true if the server is willing to dispatch jobs
  // to this agent. False means the agent's identity was
  // recognized but is currently blocked (e.g. removed from the
  // matrix).
  bool accepted = 2;
}
