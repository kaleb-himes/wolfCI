// wolfCI agent-to-server protocol. Hand-edit this file; the
// matching .pb.go and _grpc.pb.go files are generated by
// scripts/gen-proto.sh.
syntax = "proto3";

package wolfci.v1;

option go_package = "github.com/kaleb-himes/wolfCI/api/v1;wolfciv1";

// AgentService is the surface the wolfCI server exposes to
// agents over wolfSSL mTLS.
service AgentService {
  // Register lets an agent announce itself. Returns the server's
  // version and whether the agent is currently accepted.
  rpc Register(AgentInfo) returns (RegisterResponse);

  // Connect is the long-lived bidirectional stream used to
  // dispatch jobs to the agent and to receive log chunks and
  // build completions back. The first message in each direction
  // is delivered by the side that has data; both sides are free
  // to send at any time.
  rpc Connect(stream AgentMessage) returns (stream ServerMessage);
}

// AgentInfo is what an agent tells the server about itself when
// it first connects.
message AgentInfo {
  string agent_id = 1;
  repeated string labels = 2;
  int32 executors = 3;
}

// RegisterResponse is the server's reply to Register.
message RegisterResponse {
  string server_version = 1;
  bool accepted = 2;
}

// AgentMessage is anything an agent sends on the Connect stream.
message AgentMessage {
  oneof body {
    LogChunk log = 1;
    BuildComplete complete = 2;
    Heartbeat heartbeat = 3;
  }
}

// ServerMessage is anything the server sends on the Connect
// stream.
message ServerMessage {
  oneof body {
    JobAssignment assignment = 1;
  }
}

// JobAssignment is a build the server wants the agent to run.
message JobAssignment {
  string job_name = 1;
  int32 build_number = 2;
  repeated Step steps = 3;
}

// Step is one shell command in a job's pipeline.
message Step {
  string name = 1;
  string shell = 2;
  map<string, string> env = 3;
}

// LogChunk is a piece of build output streamed from the agent
// back to the server.
message LogChunk {
  int32 build_number = 1;
  bytes data = 2;
}

// BuildComplete reports the final outcome of a build.
message BuildComplete {
  int32 build_number = 1;
  // status is one of "success", "failure", "cancelled", "error".
  string status = 2;
  int32 exit_code = 3;
  string error = 4;
}

// NodeStatus is the portable host-metrics snapshot the agent
// sends with every Heartbeat (Phase 12 Nodes view). Field names
// mirror internal/nodeinfo.Snapshot; wall_clock_unix_micros and
// host_uptime_seconds are the wire-safe encodings of the Go
// time.Time and time.Duration the agent carries internally.
message NodeStatus {
  string architecture = 1;
  string go_version = 2;
  int64 free_disk_bytes = 3;
  int64 free_swap_bytes = 4;
  int64 free_temp_bytes = 5;
  int64 host_uptime_seconds = 6;
  int64 wall_clock_unix_micros = 7;
  string agent_version = 8;
}

// Heartbeat is the agent's periodic ping carrying a NodeStatus.
// Cadence is configurable via agent.yaml's heartbeat_interval
// (Phase 12.3); the server treats absence as "agent offline"
// past StaleThreshold (Phase 12.4).
message Heartbeat {
  NodeStatus status = 1;
}
