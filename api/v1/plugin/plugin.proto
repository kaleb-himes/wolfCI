// wolfCI plugin protocol. Plugins are out-of-process gRPC
// servers loaded by the wolfCI server via hashicorp/go-plugin.
// Hand-edit this file; the matching .pb.go and _grpc.pb.go
// files are generated by scripts/gen-proto.sh.
syntax = "proto3";

package wolfci.v1.plugin;

option go_package = "github.com/kaleb-himes/wolfCI/api/v1/plugin;pluginv1";

// WolfCIPlugin is the contract every wolfCI plugin
// implements. Phase 7 ships only OnBuildComplete; more
// lifecycle hooks (on-build-start, on-job-create, etc.) land
// as the need arises.
service WolfCIPlugin {
  // OnBuildComplete fires after the server records a build's
  // final result. Plugins do whatever they like with the event:
  // send a notification, post to a chat service, update an
  // external dashboard. The server does not wait long for the
  // reply; plugins that need to do slow work should return
  // quickly and continue in their own goroutine.
  rpc OnBuildComplete(BuildCompleteEvent) returns (Empty);
}

// BuildCompleteEvent is everything a plugin learns about a
// finished build.
message BuildCompleteEvent {
  string job_name = 1;
  int32 build_number = 2;
  // status is one of "success", "failure", "cancelled", "error",
  // matching scheduler.Status.
  string status = 3;
  int32 exit_code = 4;
  string error = 5;
}

message Empty {}
