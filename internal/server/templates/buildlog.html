{{ define "content" }}
<section class="panel">
<h2>Build {{ .BuildNum }} - {{ .JobName }}</h2>
<p>
<a href="/jobs/{{ .JobName }}">&larr; Back to {{ .JobName }}</a>
&middot; <a href="/jobs/{{ .JobName }}/builds/{{ .BuildNum }}/ws/">Workspace</a>
{{ if .CanRun }}
&middot; <form method="POST" action="/jobs/{{ .JobName }}/rebuild?spec=current" class="rebuild-inline-form" style="display:inline">
<button type="submit">Rebuild with current spec</button>
</form>
{{ end }}
</p>
<p class="muted">Live log; new output appends as it arrives.</p>
<pre id="log" class="log"></pre>
<script>
(function () {
  var el = document.getElementById("log");
  var es = new EventSource({{ .StreamURL }});
  es.addEventListener("log", function (ev) {
    try {
      var decoded = atob(ev.data);
      el.appendChild(document.createTextNode(decoded));
    } catch (e) {
      el.appendChild(document.createTextNode("[wolfci: undecodable chunk]\n"));
    }
    window.scrollTo(0, document.body.scrollHeight);
  });
  es.addEventListener("error", function () {
    el.appendChild(document.createTextNode("\n[wolfci: stream closed]\n"));
    es.close();
  });
})();
</script>
</section>
{{ end }}
