{{ define "content" }}
<section class="panel">
<h2>Sign in</h2>
{{ if .Error }}<p class="error">{{ .Error }}</p>{{ end }}
<form method="POST" action="/login">
<label for="username">Username</label>
<input id="username" type="text" name="username" autocomplete="username" autofocus required>
<label for="password">Password</label>
<input id="password" type="password" name="password" autocomplete="current-password" required>
<button type="submit">Sign in</button>
</form>
<p class="muted">Use the username and password you chose during /setup. Your SSH public key on file authenticates agents and wolfci-ctl over gRPC; the web UI uses the password.</p>
</section>
{{ end }}
